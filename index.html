---
layout: default
title: Home
---

<div class="posts" style="max-height: calc(100vh - 250px); overflow-y: auto; overflow-x: hidden; margin-right: -2.5rem; padding-right: 2.5rem;">
  {% for post in site.posts %}
  <div class="post">
    <h1 class="post-title" style="width:100%; margin-bottom:0;">
      <a href="{{ post.url }}">
        {{ post.title }}
      </a>
    </h1>
    <span class="post-date">{{ post.date | date_to_string }}</span><br>
    <p>{{ post.excerpt | strip_html | truncate: 500 }}</p>
  </div>
  {% endfor %}
</div>
